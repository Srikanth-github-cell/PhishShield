<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0088ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer shield -->
  <path d="M32 4 L56 16 L56 40 C56 48 48 56 32 60 C16 56 8 48 8 40 L8 16 Z" 
        fill="url(#cyberGradient)" 
        filter="url(#glow)" 
        opacity="0.8"/>
  
  <!-- Inner shield -->
  <path d="M32 8 L52 18 L52 38 C52 44 44 50 32 54 C20 50 12 44 12 38 L12 18 Z" 
        fill="none" 
        stroke="url(#cyberGradient)" 
        stroke-width="2" 
        filter="url(#glow)"/>
  
  <!-- Center hex -->
  <polygon points="32,20 40,25 40,35 32,40 24,35 24,25" 
           fill="url(#cyberGradient)" 
           filter="url(#glow)"/>
  
  <!-- Tech lines -->
  <line x1="16" y1="24" x2="22" y2="27" stroke="#00ff88" stroke-width="1" opacity="0.8"/>
  <line x1="16" y1="32" x2="22" y2="32" stroke="#0088ff" stroke-width="1" opacity="0.8"/>
  <line x1="16" y1="40" x2="22" y2="37" stroke="#aa00ff" stroke-width="1" opacity="0.8"/>
  
  <line x1="48" y1="24" x2="42" y2="27" stroke="#00ff88" stroke-width="1" opacity="0.8"/>
  <line x1="48" y1="32" x2="42" y2="32" stroke="#0088ff" stroke-width="1" opacity="0.8"/>
  <line x1="48" y1="40" x2="42" y2="37" stroke="#aa00ff" stroke-width="1" opacity="0.8"/>
</svg>

